# TED Auto-Fix Engine — IoT Rule Configuration
# Each rule defines triggers, diagnosis, and executable fix commands
# fix_commands.windows: run locally on kiosk/device via subprocess
# fix_commands.ssh:     run remotely on employee device via Paramiko SSH

thresholds:
  cpu_percent:    85    # % CPU to flag
  memory_percent: 88    # % RAM to flag
  disk_percent:   90    # % disk to flag
  disk_free_gb:   5     # GB free to flag
  battery_percent: 15   # % battery to flag

# ── AI-matched issue auto-fix scripts ──────────────────────────────────────
# Keyed by 'ai_pattern' — matched to AI engine diagnosis category
ai_fixes:

  WIFI:
    name: "Wi-Fi / Network Reset"
    category: network
    severity: medium
    description: "Flushing DNS and resetting network settings"
    steps:
      - label: "Flushing DNS cache"
        command_windows: "ipconfig /flushdns && echo DNS flushed"
        command_ssh: "sudo systemd-resolve --flush-caches 2>/dev/null; echo done"
        timeout: 5
      - label: "Resetting Winsock catalog"
        command_windows: "netsh winsock reset && echo Winsock reset"
        command_ssh: "echo not applicable"
        timeout: 5
      - label: "Clearing ARP cache"
        command_windows: "arp -d * 2>nul & echo ARP cache cleared"
        command_ssh: "sudo ip neigh flush all 2>/dev/null; echo done"
        timeout: 5

  VPN:
    name: "VPN Connection Reset"
    category: network
    severity: high
    description: "Flushing DNS and resetting network for VPN reconnection"
    steps:
      - label: "Flushing DNS cache"
        command_windows: "ipconfig /flushdns && echo DNS flushed"
        command_ssh: "sudo systemd-resolve --flush-caches 2>/dev/null; echo done"
        timeout: 5
      - label: "Resetting Winsock catalog"
        command_windows: "netsh winsock reset && echo Winsock reset"
        command_ssh: "echo not applicable"
        timeout: 5
      - label: "Clearing network route cache"
        command_windows: "route -f 2>nul & echo Routes cleared"
        command_ssh: "sudo ip route flush cache 2>/dev/null; echo done"
        timeout: 5

  PRINTER:
    name: "Printer Spooler Reset"
    category: peripheral
    severity: low
    description: "Clearing stuck print queue and restarting print spooler service"
    steps:
      - label: "Stopping Print Spooler"
        command_windows: "net stop spooler"
        command_ssh: "sudo systemctl stop cups"
        timeout: 10
      - label: "Clearing print queue"
        command_windows: "del /Q /F /S \"%systemroot%\\System32\\spool\\PRINTERS\\*\" 2>nul & echo Queue cleared"
        command_ssh: "sudo rm -f /var/spool/cups/* 2>/dev/null; echo done"
        timeout: 5
      - label: "Starting Print Spooler"
        command_windows: "net start spooler"
        command_ssh: "sudo systemctl start cups"
        timeout: 10

  TEAMS:
    name: "Microsoft Teams Cache Clear"
    category: application
    severity: medium
    description: "Killing Teams, clearing cache, and restarting the application"
    steps:
      - label: "Closing Microsoft Teams"
        command_windows: "taskkill /F /IM Teams.exe 2>nul & taskkill /F /IM ms-teams.exe 2>nul & echo Teams closed"
        command_ssh: "pkill -f teams 2>/dev/null; echo done"
        timeout: 8
      - label: "Clearing Teams cache"
        command_windows: "rd /s /q \"%AppData%\\Microsoft\\Teams\\Cache\" 2>nul & rd /s /q \"%AppData%\\Microsoft\\Teams\\blob_storage\" 2>nul & echo Cache cleared"
        command_ssh: "rm -rf ~/.config/teams/Cache 2>/dev/null; echo done"
        timeout: 10
      - label: "Restarting Teams"
        command_windows: "start ms-teams:"
        command_ssh: "nohup teams &>/dev/null &"
        timeout: 5

  OUTLOOK:
    name: "Outlook Restart & Repair"
    category: application
    severity: medium
    description: "Restarting Outlook and running inbox repair"
    steps:
      - label: "Closing Outlook"
        command_windows: "taskkill /F /IM OUTLOOK.EXE 2>nul & echo Outlook closed"
        command_ssh: "pkill -f outlook 2>/dev/null; echo done"
        timeout: 8
      - label: "Clearing Outlook temp files"
        command_windows: "del /q /f \"%LOCALAPPDATA%\\Microsoft\\Outlook\\*.tmp\" 2>nul & echo Temp cleared"
        command_ssh: "echo done"
        timeout: 5
      - label: "Restarting Outlook"
        command_windows: "start outlook.exe"
        command_ssh: "nohup outlook &>/dev/null &"
        timeout: 5

  DISK:
    name: "Disk Space Recovery"
    category: storage
    severity: high
    description: "Clearing temp files and browser cache to free disk space"
    steps:
      - label: "Clearing Windows temp files"
        command_windows: "del /s /q \"%TEMP%\\*\" 2>nul & echo Temp cleared"
        command_ssh: "rm -rf /tmp/* 2>/dev/null; echo done"
        timeout: 8
      - label: "Clearing user temp folder"
        command_windows: "del /s /q \"%LOCALAPPDATA%\\Temp\\*\" 2>nul & echo Local temp cleared"
        command_ssh: "echo done"
        timeout: 8
      - label: "Removing Windows error reports"
        command_windows: "del /s /q \"%LOCALAPPDATA%\\Microsoft\\Windows\\WER\\*\" 2>nul & echo Reports cleared"
        command_ssh: "echo done"
        timeout: 5

  HIGH_MEMORY:
    name: "Memory Optimisation"
    category: performance
    severity: medium
    description: "Identifying and reducing memory pressure without closing the kiosk browser"
    steps:
      - label: "Checking top memory consumers"
        command_windows: "PowerShell -Command \"Get-Process | Sort-Object WorkingSet -Descending | Select-Object -First 5 Name,@{N='MB';E={[math]::Round($_.WorkingSet/1MB,1)}} | Format-Table -AutoSize\""
        command_ssh: "ps aux --sort=-%mem | head -6"
        timeout: 10
      - label: "Clearing standby memory"
        command_windows: "PowerShell -Command \"[System.GC]::Collect(); Write-Output 'Memory cleared'\""
        command_ssh: "sync && echo 3 | sudo tee /proc/sys/vm/drop_caches"
        timeout: 5
      - label: "Reclaiming memory without closing browsers"
        command_windows: "PowerShell -Command \"[System.GC]::Collect(); Write-Output 'Memory reclaimed safely'\""
        command_ssh: "sync && echo 3 | sudo tee /proc/sys/vm/drop_caches 2>/dev/null; echo done"
        timeout: 8

  BSOD:
    name: "BSOD Immediate Stabilisation"
    category: system
    severity: critical
    # sfc /scannow removed — takes 10-30 min, crashes browser HTTP connection
    # DISM removed — takes 3-5 min, same issue
    # Replaced with fast (<5s) stabilisation steps only
    description: "Clearing crash dumps, flushing event logs, freeing memory"
    steps:
      - label: "Flushing Windows event logs"
        command_windows: "wevtutil cl System 2>nul & wevtutil cl Application 2>nul & echo Logs cleared"
        command_ssh: "sudo journalctl --vacuum-time=1d 2>/dev/null; echo done"
        timeout: 8
      - label: "Clearing crash dump files"
        command_windows: "del /q /f /s \"%SystemRoot%\\Minidump\\*\" 2>nul & echo Crash dumps cleared"
        command_ssh: "sudo rm -f /var/crash/* 2>/dev/null; echo done"
        timeout: 8
      - label: "Freeing system memory"
        command_windows: "PowerShell -Command \"[System.GC]::Collect(); Write-Output 'Memory freed'\""
        command_ssh: "sync && echo 3 | sudo tee /proc/sys/vm/drop_caches 2>/dev/null; echo done"
        timeout: 8
      - label: "Checking device health (fast)"
        command_windows: "DISM /Online /Cleanup-Image /CheckHealth 2>nul & echo Health check done"
        command_ssh: "echo not applicable"
        timeout: 15

  OKTA:
    name: "Browser Cache & Cookie Reset"
    category: auth
    severity: medium
    description: "Clearing browser authentication cache to resolve login issues"
    steps:
      - label: "Clearing Edge browser cache"
        command_windows: "PowerShell -Command \"Remove-Item -Path '$env:LOCALAPPDATA\\Microsoft\\Edge\\User Data\\Default\\Cache\\*' -Recurse -Force -ErrorAction SilentlyContinue; Write-Output 'Edge cache cleared'\""
        command_ssh: "rm -rf ~/.cache/chromium/Default/Cache 2>/dev/null; echo done"
        timeout: 10
      - label: "Clearing Chrome browser cache"
        command_windows: "PowerShell -Command \"Remove-Item -Path '$env:LOCALAPPDATA\\Google\\Chrome\\User Data\\Default\\Cache\\*' -Recurse -Force -ErrorAction SilentlyContinue; Write-Output 'Chrome cache cleared'\""
        command_ssh: "rm -rf ~/.config/google-chrome/Default/Cache 2>/dev/null; echo done"
        timeout: 10
      - label: "Opening Okta self-service"
        command_windows: "start https://company.okta.com/signin/forgot-password"
        command_ssh: "xdg-open https://company.okta.com/signin/forgot-password 2>/dev/null; echo opened"
        timeout: 5

# ── Hardware threshold auto-fix rules ──────────────────────────────────────
rules:
  - id: HIGH_CPU
    name: "High CPU Usage"
    category: performance
    severity: medium
    trigger: { metric: cpu_percent, operator: ">", value: 85 }
    diagnosis: "CPU is running at high load — terminating background processes automatically"
    ai_fix_key: HIGH_MEMORY
    fix_commands:
      windows:
        - "taskkill /F /IM OneDrive.exe 2>nul & taskkill /F /IM SearchIndexer.exe 2>nul & echo CPU processes cleared"
      ssh: []

  - id: HIGH_MEMORY
    name: "High Memory Usage"
    category: performance
    severity: medium
    trigger: { metric: memory_percent, operator: ">", value: 88 }
    diagnosis: "RAM usage is critically high — clearing memory and background processes"
    ai_fix_key: HIGH_MEMORY
    fix_commands:
      windows:
        - "PowerShell -Command \"[System.GC]::Collect(); Write-Output 'Memory cleared'\""
      ssh: []

  - id: LOW_DISK
    name: "Low Disk Space"
    category: storage
    severity: high
    trigger: { metric: disk_free_gb, operator: "<", value: 5 }
    diagnosis: "Disk space critically low — running automated cleanup"
    ai_fix_key: DISK
    fix_commands:
      windows:
        - "del /s /q \"%TEMP%\\*\" 2>nul & echo Temp cleared"
        - "cleanmgr /sagerun:1"
      ssh: []

  - id: DISK_PERCENT_HIGH
    name: "Disk Usage Critical"
    category: storage
    severity: high
    trigger: { metric: disk_percent, operator: ">", value: 90 }
    diagnosis: "Disk usage above 90% — running automated cleanup"
    ai_fix_key: DISK
    fix_commands:
      windows:
        - "del /s /q \"%TEMP%\\*\" 2>nul & echo Temp cleared"
      ssh: []

  - id: LOW_BATTERY
    name: "Critical Battery"
    category: hardware
    severity: high
    trigger: { metric: battery_percent, operator: "<", value: 15 }
    diagnosis: "Battery critically low — please connect to power immediately"
    fix_commands:
      windows: []
      ssh: []

ssh:
  default_port: 22
  timeout_secs: 10
  known_hosts_policy: "auto_add"

report:
  output_dir: "reports"
  company_name: "Tech Express Desk"
